<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F88EB7"/>
      <stop offset="100%" stop-color="#EE3B7C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg2)"/>

  <!-- Soft bg circles -->
  <circle cx="660" cy="140" r="210" fill="rgba(255,255,255,0.07)"/>
  <circle cx="90" cy="540" r="140" fill="rgba(0,0,0,0.05)"/>

  <!-- Large & shadow -->
  <text x="68" y="420" font-family="Georgia, serif" font-size="340" fill="rgba(0,190,210,0.12)">&amp;</text>
  <!-- Large & main -->
  <text x="72" y="415" font-family="Georgia, serif" font-size="320" font-weight="700" fill="#00C8E4" opacity="0.92">&amp;</text>

  <!-- Orchid — right side -->
  <g transform="translate(610, 310)">
    <!-- 5 petals -->
    <ellipse cx="0" cy="-90" rx="34" ry="65" fill="rgba(255,255,255,0.82)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-90" rx="34" ry="65" fill="rgba(255,255,255,0.82)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-90" rx="34" ry="65" fill="rgba(255,255,255,0.82)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-90" rx="34" ry="65" fill="rgba(255,255,255,0.82)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-90" rx="34" ry="65" fill="rgba(255,255,255,0.82)" transform="rotate(288)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="26" fill="#00C8E4"/>
    <circle cx="0" cy="0" r="16" fill="#EE3B7C"/>
    <circle cx="0" cy="0" r="7" fill="white"/>
  </g>

  <!-- Title -->
  <text x="72" y="112" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white" letter-spacing="3">HUMAN DESIGN</text>
  <text x="72" y="148" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.72)" letter-spacing="4">HYPERSENSIBILITÉ</text>

  <!-- Divider -->
  <line x1="72" y1="530" x2="290" y2="530" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Bottom -->
  <text x="72" y="555" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" letter-spacing="4">MP CONSULTING</text>
</svg>
